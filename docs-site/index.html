  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    // Robust Mermaid rendering for Docsify
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: '#e0e7ff', primaryBorderColor: '#6366f1', primaryTextColor: '#1e293b',
        lineColor: '#94a3b8', secondaryColor: '#f0fdf4', tertiaryColor: '#fef3c7',
        fontFamily: '-apple-system, system-ui, sans-serif', fontSize: '14px',
        nodeBorder: '#6366f1', mainBkg: '#e0e7ff', clusterBkg: '#f8fafc', clusterBorder: '#e2e8f0'
      }
    });

    // Use Docsify hook to render Mermaid after each page load
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook) {
        hook.afterEach(function(html) { return html; });
        hook.doneEach(function() {
          renderMermaidDiagrams();
        });
      }
    ]);

    let mermaidCounter = 0;
    async function renderMermaidDiagrams() {
      const elements = document.querySelectorAll('.mermaid');
      for (const el of elements) {
        if (el.getAttribute('data-mermaid-done')) continue;
        el.setAttribute('data-mermaid-done', 'true');
        const code = el.textContent || el.innerText;
        if (!code.trim()) continue;
        try {
          const id = 'mermaid-' + (++mermaidCounter);
          const { svg } = await mermaid.render(id, code.trim());
          el.innerHTML = svg;
          // Add click-to-zoom
          el.style.cursor = 'pointer';
          el.title = 'Click to zoom';
          el.addEventListener('click', () => openZoom(el.innerHTML));
        } catch (e) {
          console.warn('Mermaid render error:', e.message);
          el.innerHTML = '<pre style="color:#ef4444;font-size:12px;">Diagram error: ' + e.message + '</pre>';
        }
      }
    }

    // Diagram Zoom + Pan functions
    let zScale = 1, zX = 0, zY = 0;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragStartZX = 0, dragStartZY = 0;

    function openZoom(svgHtml) {
      const container = document.getElementById('diagram-zoom-container');
      container.innerHTML = svgHtml;
      const svg = container.querySelector('svg');
      if (!svg) return;

      // Show overlay first so container has dimensions
      document.getElementById('diagram-zoom-overlay').classList.add('open');
      document.getElementById('diagram-zoom-controls').classList.add('open');

      // Use requestAnimationFrame to measure after layout
      requestAnimationFrame(() => {
        const cw = container.clientWidth - 48;
        const ch = container.clientHeight - 48;

        // Get actual SVG dimensions — try multiple methods
        let sw, sh;
        // Method 1: viewBox (most reliable for Mermaid SVGs)
        const vb = svg.viewBox?.baseVal;
        if (vb && vb.width > 0) { sw = vb.width; sh = vb.height; }
        else {
          // Method 2: explicit width/height attributes
          const aw = parseFloat(svg.getAttribute('width'));
          const ah = parseFloat(svg.getAttribute('height'));
          if (aw > 0) { sw = aw; sh = ah; }
          else {
            // Method 3: getBoundingClientRect after render
            // Reset any transforms first so we get true size
            svg.style.transform = 'none';
            svg.style.position = 'static';
            const rect = svg.getBoundingClientRect();
            sw = rect.width || 800;
            sh = rect.height || 400;
          }
        }

        // Scale to fill 90% of the viewport — no artificial cap
        const scaleX = cw / sw;
        const scaleY = ch / sh;
        zScale = Math.min(scaleX, scaleY) * 0.9; // 90% fill, slight padding

        // Center it
        zX = (container.clientWidth - sw * zScale) / 2;
        zY = (container.clientHeight - sh * zScale) / 2;

        applyZoomTransform(svg);
      });
    }

    function applyZoomTransform(svg) {
      if (!svg) svg = document.querySelector('#diagram-zoom-container svg');
      if (!svg) return;
      svg.style.position = 'absolute';
      svg.style.top = '0';
      svg.style.left = '0';
      svg.style.transform = 'translate(' + zX + 'px,' + zY + 'px) scale(' + zScale + ')';
      svg.style.transformOrigin = '0 0';
      svg.style.transition = isDragging ? 'none' : 'transform 0.15s ease';
    }

    function closeZoom() {
      document.getElementById('diagram-zoom-overlay').classList.remove('open');
      document.getElementById('diagram-zoom-controls').classList.remove('open');
      isDragging = false;
    }

    function getSvgNaturalSize(svg) {
      const vb = svg.viewBox?.baseVal;
      if (vb && vb.width > 0) return { w: vb.width, h: vb.height };
      const aw = parseFloat(svg.getAttribute('width'));
      if (aw > 0) return { w: aw, h: parseFloat(svg.getAttribute('height')) };
      return { w: 800, h: 400 };
    }

    function zoomDiagram(factor) {
      const container = document.getElementById('diagram-zoom-container');
      const svg = container.querySelector('svg');
      if (!svg) return;
      const oldScale = zScale;
      if (factor === 0) {
        // Reset: re-fit to 90% of viewport
        const { w: sw, h: sh } = getSvgNaturalSize(svg);
        const cw = container.clientWidth - 48;
        const ch = container.clientHeight - 48;
        zScale = Math.min(cw / sw, ch / sh) * 0.9;
        zX = (container.clientWidth - sw * zScale) / 2;
        zY = (container.clientHeight - sh * zScale) / 2;
      } else {
        const cx = container.clientWidth / 2;
        const cy = container.clientHeight / 2;
        zScale = Math.max(0.2, Math.min(5, zScale * factor));
        // Zoom toward center
        zX = cx - (cx - zX) * (zScale / oldScale);
        zY = cy - (cy - zY) * (zScale / oldScale);
      }
      applyZoomTransform(svg);
    }

    // Mouse drag to pan
    const zoomContainer = document.getElementById('diagram-zoom-container');
    zoomContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragStartX = e.clientX; dragStartY = e.clientY;
      dragStartZX = zX; dragStartZY = zY;
      zoomContainer.classList.add('dragging');
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      zX = dragStartZX + (e.clientX - dragStartX);
      zY = dragStartZY + (e.clientY - dragStartY);
      applyZoomTransform();
    });
    document.addEventListener('mouseup', () => {
      if (isDragging) { isDragging = false; zoomContainer.classList.remove('dragging'); }
    });

    // Scroll to zoom (toward mouse pointer)
    zoomContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = zoomContainer.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const oldScale = zScale;
      const factor = e.deltaY < 0 ? 1.15 : 0.87;
      zScale = Math.max(0.2, Math.min(5, zScale * factor));
      // Zoom toward mouse pointer
      zX = mx - (mx - zX) * (zScale / oldScale);
      zY = my - (my - zY) * (zScale / oldScale);
      applyZoomTransform();
    }, { passive: false });

    // Escape to close
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeZoom(); });
  </script>

  <script>

    document.addEventListener('mouseup', (e) => {

        selectedContext = text;
        const rect = sel.getRangeAt(0).getBoundingClientRect();
        btn.style.left = (rect.left + rect.width/2 - 40 + window.scrollX) + 'px';
        btn.style.top = (rect.top - 40 + window.scrollY) + 'px';
        btn.style.display = 'block';
      } else if (!e.target.closest('#ask-ai-btn')) { btn.style.display = 'none'; }
    });
    document.getElementById('ask-ai-btn').addEventListener('click', () => {
      document.getElementById('ask-ai-btn').style.display = 'none';
      openPanelWithContext(selectedContext);
    });
    function togglePanel() {
      panelOpen = !panelOpen;
      document.getElementById('ai-chat-panel').classList.toggle('open', panelOpen);
      document.getElementById('ai-fab').classList.toggle('hidden', panelOpen);
    }
    document.getElementById('ai-fab').addEventListener('click', () => {
      selectedContext = '';
      document.getElementById('ai-chat-context').innerHTML = '';
      togglePanel();
    });
    function openPanelWithContext(text) {
      if (!panelOpen) togglePanel();
      const ctx = document.getElementById('ai-chat-context');
      ctx.innerHTML = text ? '<strong>Selected:</strong> ' + (text.length > 200 ? text.substring(0,200)+'...' : text) : '';
      document.getElementById('ai-chat-input').focus();
    }
    function clearChat() {
      document.getElementById('ai-chat-messages').innerHTML = '<div class="ai-msg assistant">Chat cleared. Select text or ask anything!</div>';
      selectedContext = '';
      document.getElementById('ai-chat-context').innerHTML = '';
    }
    async function sendMessage() {
      const input = document.getElementById('ai-chat-input');
      const q = input.value.trim(); if (!q) return;
      input.value = '';
      const msgs = document.getElementById('ai-chat-messages');
      const u = document.createElement('div'); u.className='ai-msg user'; u.textContent=q; msgs.appendChild(u);
      const t = document.createElement('div'); t.className='ai-msg assistant'; t.style.color='#94a3b8'; t.style.fontStyle='italic'; t.textContent='Thinking...'; msgs.appendChild(t);
      msgs.scrollTop = msgs.scrollHeight;
      const page = document.querySelector('.markdown-section')?.innerText?.substring(0,3000) || '';
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q, context: selectedContext || null, pageContent: page })
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        t.style.color=''; t.style.fontStyle='';
        const text = d.content?.[0]?.text || d.error || 'No response';
        t.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code>$1</code>').replace(/\n- /g,'<br>• ').replace(/\n/g,'<br>');
      } catch(e) {
        t.style.color='#ef4444'; t.style.fontStyle=''; t.textContent='Error: '+e.message;
      }
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>
